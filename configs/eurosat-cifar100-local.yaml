name: clip-eurosat-cifar100-local
tier: research
seed: 42
model:
  family: openai-clip-vit-b-32
  revision: openai/clip-vit-base-patch32
method:
  name: lora
  fidelity: corrected-local-domain-expansion
  strategy: standard
  rank: 8
  alpha: 16
  dropout: 0.1
  target_modules: [q_proj, v_proj]
  expected_trainable_parameters: 294912
datasets:
  loading_mode: dataset-server-stratified
  adaptation:
    repository: blanchon/EuroSat
    config: default
    split: train
    image_field: image
    label_field: label
    class_count: 6
    train_per_class: 4
    eval_per_class: 4
    server_window: 80
  retained:
    repository: uoft-cs/cifar100
    config: cifar100
    split: test
    image_field: img
    label_field: fine_label
    eval_start: 0
    eval_size: 40
training:
  total_steps: 20
  checkpoint_steps: [0, 5, 10, 20]
  batch_size: 4
  evaluation_batch_size: 8
  learning_rate: 0.0005
analysis:
  covariance_projection_dim: 16
  diagnostics_version: layerwise-cross-modal-v1
  collect_vision_hidden_states: true
runtime:
  device: auto
output_dir: artifacts/runs
