name: clip-food101-cifar10-nullspace-local
tier: research
seed: 42
model:
  family: openai-clip-vit-b-32
  revision: openai/clip-vit-base-patch32
method:
  name: retention-gradient-nullspace
  fidelity: inspired-first-order-gradient-projection-baseline
  strategy: retention-gradient-nullspace
  rank: 8
  alpha: 16
  dropout: 0.1
  target_modules: [q_proj, v_proj]
  expected_trainable_parameters: 294912
datasets:
  loading_mode: dataset-server-stratified
  adaptation:
    repository: ethz/food101
    config: default
    split: train
    image_field: image
    class_count: 6
    train_per_class: 4
    eval_per_class: 4
    server_window: 64
  retained:
    repository: uoft-cs/cifar10
    config: plain_text
    split: test
    image_field: img
    eval_start: 0
    eval_size: 30
    reference_start: 1000
    reference_size: 30
training:
  total_steps: 20
  checkpoint_steps: [0, 5, 10, 20]
  batch_size: 4
  evaluation_batch_size: 8
  learning_rate: 0.0005
analysis:
  covariance_projection_dim: 16
  diagnostics_version: layerwise-cross-modal-v1
  collect_vision_hidden_states: true
runtime:
  device: auto
output_dir: artifacts/runs
