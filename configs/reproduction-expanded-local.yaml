name: clip-food101-cifar10-expanded-local
tier: expanded-local-preliminary
seed: 42
model:
  family: openai-clip-vit-b-32
  revision: openai/clip-vit-base-patch32
method:
  name: lora
  fidelity: preregistered-expanded-local-validation
  rank: 8
  alpha: 16
  dropout: 0.1
  target_modules: [q_proj, v_proj]
  expected_trainable_parameters: 294912
datasets:
  loading_mode: dataset-server-stratified
  adaptation:
    repository: ethz/food101
    config: default
    split: train
    image_field: image
    class_count: 8
    train_per_class: 8
    eval_per_class: 8
    server_window: 128
  retained:
    repository: uoft-cs/cifar10
    config: plain_text
    split: test
    image_field: img
    eval_start: 200
    eval_size: 100
training:
  total_steps: 50
  checkpoint_steps: [0, 10, 25, 50]
  batch_size: 8
  evaluation_batch_size: 16
  learning_rate: 0.0005
analysis:
  covariance_projection_dim: 32
  diagnostics_version: layerwise-cross-modal-v1
  collect_vision_hidden_states: true
runtime:
  device: auto
output_dir: artifacts/runs
