name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install foundation lock
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps
          python -m pip install pytest
      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests -q
      - name: Smoke pipeline + artifact validation
        run: |
          PYTHONPATH=src python -m driftlab smoke --config configs/smoke.yaml --web-output public/data/smoke.json
          PYTHONPATH=src python -m driftlab validate-artifact public/data/smoke.json

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Build (validates artifacts and budgets)
        run: npm run build
